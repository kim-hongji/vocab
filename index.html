<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>영단어 암기장</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== shadcn/ui CSS Variables (Dark - Zinc) ===== */
:root {
  --radius: 0.625rem;
}
.dark {
  --background: oklch(1 0 0);
  --foreground: oklch(0.145 0 0);
  --card: oklch(1 0 0);
  --card-foreground: oklch(0.145 0 0);
  --popover: oklch(1 0 0);
  --popover-foreground: oklch(0.145 0 0);
  --primary: oklch(0.205 0 0);
  --primary-foreground: oklch(0.985 0 0);
  --secondary: oklch(0.965 0 0);
  --secondary-foreground: oklch(0.205 0 0);
  --muted: oklch(0.965 0 0);
  --muted-foreground: oklch(0.556 0 0);
  --accent: oklch(0.965 0 0);
  --accent-foreground: oklch(0.205 0 0);
  --destructive: oklch(0.577 0.245 27.325);
  --destructive-foreground: oklch(0.985 0 0);
  --border: oklch(0.922 0 0);
  --input: oklch(0.922 0 0);
  --ring: oklch(0.708 0 0);
  --chart-1: oklch(0.488 0.243 264.376);
  --success: oklch(0.517 0.174 162.48);
  --success-foreground: oklch(0.985 0 0);
}

/* ===== Reset & Base ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--background);
  color: var(--foreground);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-size: 14px;
  line-height: 1.5;
}

/* ===== Header (shadcn Navbar style) ===== */
.header {
  background: var(--card);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}
.header h1 {
  font-size: 16px;
  font-weight: 600;
  color: var(--foreground);
  letter-spacing: -0.025em;
}

/* ===== shadcn Button ===== */
.btn {
  border: none;
  border-radius: calc(var(--radius) - 2px);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s ease;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  white-space: nowrap;
  line-height: 1;
  font-family: inherit;
}
.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}
.btn:disabled {
  pointer-events: none;
  opacity: 0.5;
}

/* Default (primary) */
.btn-primary {
  background: var(--primary);
  color: var(--primary-foreground);
  padding: 0 16px;
  height: 40px;
  font-weight: 500;
}
.btn-primary:hover { opacity: 0.9; }

/* Secondary */
.btn-secondary {
  background: var(--secondary);
  color: var(--secondary-foreground);
  padding: 0 16px;
  height: 40px;
}
.btn-secondary:hover { background: oklch(0.945 0 0); }

/* Destructive */
.btn-destructive {
  background: var(--destructive);
  color: var(--destructive-foreground);
  padding: 0 16px;
  height: 40px;
}
.btn-destructive:hover { opacity: 0.9; }

/* Outline */
.btn-outline {
  background: transparent;
  color: var(--foreground);
  border: 1px solid var(--border);
  padding: 0 16px;
  height: 40px;
}
.btn-outline:hover {
  background: var(--accent);
  color: var(--accent-foreground);
}

/* Ghost */
.btn-ghost {
  background: transparent;
  color: var(--foreground);
  padding: 0 16px;
  height: 40px;
}
.btn-ghost:hover {
  background: var(--accent);
  color: var(--accent-foreground);
}

/* Small */
.btn-sm {
  height: 32px;
  padding: 0 12px;
  font-size: 13px;
  border-radius: calc(var(--radius) - 4px);
}

/* Icon */
.btn-icon {
  width: 36px;
  height: 36px;
  padding: 0;
  background: transparent;
  color: var(--muted-foreground);
  border: 1px solid var(--border);
  border-radius: calc(var(--radius) - 2px);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.btn-icon:hover {
  background: var(--accent);
  color: var(--accent-foreground);
}

/* ===== shadcn Tabs ===== */
.tabs {
  display: flex;
  background: var(--muted);
  padding: 4px;
  margin: 16px 16px 0;
  border-radius: var(--radius);
  gap: 0;
}
.tab {
  flex: 1;
  padding: 8px 12px;
  text-align: center;
  border: none;
  background: transparent;
  color: var(--muted-foreground);
  font-size: 14px;
  font-weight: 500;
  border-radius: calc(var(--radius) - 2px);
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  line-height: 1.4;
}
.tab.active {
  background: var(--background);
  color: var(--foreground);
  box-shadow: 0 1px 3px oklch(0 0 0 / 0.06);
}

/* ===== Pages ===== */
.page { display: none; padding: 16px; }
.page.active { display: block; }

/* ===== shadcn Card ===== */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  color: var(--card-foreground);
}
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.card-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--foreground);
  letter-spacing: -0.025em;
}
.card-description {
  font-size: 14px;
  color: var(--muted-foreground);
  line-height: 1.5;
}

/* ===== Word List ===== */
.word-list { display: flex; flex-direction: column; gap: 8px; padding-bottom: 80px; }
.word-item {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  border: 1px solid var(--border);
  transition: background 0.15s;
}
.word-item:hover { background: oklch(0.965 0 0); }
.word-item-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.word-item-header h3 {
  font-size: 16px;
  color: var(--foreground);
  font-weight: 600;
  letter-spacing: -0.025em;
}
.word-item-actions { display: flex; gap: 6px; }
.word-meaning {
  color: var(--muted-foreground);
  font-size: 14px;
  margin-bottom: 4px;
}
.word-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}

/* ===== shadcn Badge ===== */
.badge {
  font-size: 12px;
  padding: 2px 10px;
  border-radius: 9999px;
  font-weight: 500;
  line-height: 1.6;
  display: inline-flex;
  align-items: center;
  border: 1px solid transparent;
}
.badge-secondary {
  background: var(--secondary);
  color: var(--secondary-foreground);
}
.badge-syn {
  background: oklch(0.488 0.243 264.376 / 0.1);
  color: oklch(0.388 0.2 264.376);
  border-color: oklch(0.488 0.243 264.376 / 0.15);
}
.badge-ant {
  background: oklch(0.577 0.245 27.325 / 0.1);
  color: oklch(0.477 0.2 27.325);
  border-color: oklch(0.577 0.245 27.325 / 0.15);
}

/* Empty State */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted-foreground);
}
.empty-state-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}
.empty-state p { font-size: 14px; line-height: 1.6; }

/* ===== Study Mode Select ===== */
.study-mode-select {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 8px 0;
}
.study-mode-select h2 {
  font-size: 18px;
  font-weight: 600;
  color: var(--foreground);
  letter-spacing: -0.025em;
}

/* Mode cards as shadcn radio-group style */
.mode-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.mode-card:hover { background: oklch(0.965 0 0); }
.mode-card.selected {
  border-color: var(--primary);
  background: oklch(0.965 0 0);
}
.mode-card.selected::before {
  content: '';
  position: absolute;
  top: 18px;
  right: 16px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--primary);
  box-shadow: inset 0 0 0 3px var(--card);
}
.mode-card::after {
  content: '';
  position: absolute;
  top: 18px;
  right: 16px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 2px solid var(--border);
}
.mode-card.selected::after { border-color: var(--primary); }
.mode-card h3 {
  font-size: 14px;
  color: var(--foreground);
  font-weight: 500;
  margin-bottom: 2px;
}
.mode-card p {
  font-size: 13px;
  color: var(--muted-foreground);
}

/* ===== shadcn Switch ===== */
.study-options {
  display: flex;
  gap: 10px;
  align-items: center;
  justify-content: space-between;
  padding: 0 4px;
}
.toggle-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  font-weight: 500;
  color: var(--foreground);
}
.toggle {
  width: 44px;
  height: 24px;
  background: var(--input);
  border-radius: 9999px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
  flex-shrink: 0;
}
.toggle.on { background: var(--primary); }
.toggle::after {
  content: '';
  width: 20px;
  height: 20px;
  background: var(--background);
  border-radius: 50%;
  position: absolute;
  top: 2px;
  left: 2px;
  transition: transform 0.2s;
  box-shadow: 0 1px 2px oklch(0 0 0 / 0.08);
}
.toggle.on::after {
  transform: translateX(20px);
  background: var(--primary-foreground);
}

/* ===== Study Card ===== */
.study-container { display: none; padding-bottom: 80px; }
.study-container.active { display: block; }
.study-progress {
  text-align: center;
  color: var(--muted-foreground);
  font-size: 14px;
  margin-bottom: 12px;
  font-weight: 500;
}
.study-progress-bar {
  height: 4px;
  background: var(--secondary);
  border-radius: 9999px;
  margin-bottom: 20px;
  overflow: hidden;
}
.study-progress-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 9999px;
  transition: width 0.3s ease;
}

.study-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 32px 24px;
  min-height: 280px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  margin-bottom: 16px;
  text-align: center;
}
.study-card-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted-foreground);
  margin-bottom: 12px;
  font-weight: 500;
}
.study-card-main {
  font-size: 26px;
  font-weight: 700;
  color: var(--foreground);
  margin-bottom: 24px;
  line-height: 1.3;
  letter-spacing: -0.025em;
}

/* Hidden answer area */
.study-card-hidden {
  width: 100%;
  padding: 20px;
  background: var(--secondary);
  border-radius: calc(var(--radius) - 2px);
  cursor: pointer;
  transition: all 0.2s;
  min-height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid transparent;
}
.study-card-hidden:hover {
  background: oklch(0.945 0 0);
}
.study-card-hidden .tap-hint {
  color: var(--muted-foreground);
  font-size: 14px;
  font-weight: 500;
}
.study-card-hidden.revealed {
  background: oklch(0.517 0.174 162.48 / 0.08);
  border-color: oklch(0.517 0.174 162.48 / 0.25);
}
.study-card-hidden.revealed:hover {
  background: oklch(0.517 0.174 162.48 / 0.08);
}
.study-card-hidden.revealed .tap-hint { display: none; }
.study-card-hidden .answer {
  display: none;
  font-size: 20px;
  font-weight: 600;
  color: var(--success);
}
.study-card-hidden.revealed .answer { display: block; }

.study-card-extras {
  width: 100%;
  margin-top: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.study-extra-row {
  display: none;
  padding: 12px 16px;
  background: var(--background);
  border-radius: calc(var(--radius) - 2px);
  text-align: left;
  border: 1px solid var(--border);
}
.study-extra-row.visible { display: block; }
.study-extra-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--muted-foreground);
  margin-bottom: 4px;
  font-weight: 500;
}
.study-extra-value {
  font-size: 14px;
  color: var(--foreground);
}

/* Study nav buttons */
.study-nav {
  display: flex;
  gap: 8px;
}
.study-nav .btn {
  flex: 1;
  height: 44px;
  font-size: 14px;
  font-weight: 500;
}
.btn-correct {
  background: var(--success);
  color: var(--success-foreground);
}
.btn-correct:hover { opacity: 0.9; }
.btn-wrong {
  background: var(--destructive);
  color: var(--destructive-foreground);
}
.btn-wrong:hover { opacity: 0.9; }

/* ===== Result ===== */
.study-result {
  text-align: center;
  padding: 32px 0;
}
.study-result h2 {
  font-size: 20px;
  color: var(--foreground);
  font-weight: 600;
  margin-bottom: 8px;
  letter-spacing: -0.025em;
}
.study-result-stats {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin: 24px 0;
}
.stat-item { text-align: center; }
.stat-value { font-size: 36px; font-weight: 700; letter-spacing: -0.025em; }
.stat-label {
  font-size: 13px;
  color: var(--muted-foreground);
  margin-top: 4px;
  font-weight: 500;
}
.stat-correct .stat-value { color: var(--success); }
.stat-wrong .stat-value { color: var(--destructive); }

/* Wrong word list in result */
.wrong-item {
  background: var(--card);
  padding: 12px 16px;
  border-radius: calc(var(--radius) - 2px);
  margin-bottom: 6px;
  border: 1px solid var(--border);
  text-align: left;
}
.wrong-item strong { color: var(--foreground); font-weight: 600; }
.wrong-item span { color: var(--muted-foreground); margin-left: 8px; }

/* ===== shadcn Dialog / Sheet (bottom sheet on mobile) ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: oklch(0 0 0 / 0.5);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--card);
  width: 100%;
  max-width: 420px;
  border-radius: var(--radius) var(--radius) 0 0;
  padding: 24px;
  max-height: 90vh;
  overflow-y: auto;
  border: 1px solid var(--border);
  border-bottom: none;
}
.modal::before {
  content: '';
  display: block;
  width: 48px;
  height: 4px;
  background: var(--muted);
  border-radius: 9999px;
  margin: 0 auto 20px;
}
.modal-header {
  margin-bottom: 20px;
  text-align: center;
}
.modal h2 {
  font-size: 16px;
  color: var(--foreground);
  font-weight: 600;
  margin-bottom: 4px;
  letter-spacing: -0.025em;
}
.modal-desc {
  font-size: 14px;
  color: var(--muted-foreground);
}

/* ===== shadcn Form / Input / Label ===== */
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: 14px;
  color: var(--foreground);
  margin-bottom: 6px;
  font-weight: 500;
}
.form-group input {
  width: 100%;
  padding: 0 12px;
  height: 40px;
  background: var(--background);
  border: 1px solid var(--input);
  border-radius: calc(var(--radius) - 2px);
  color: var(--foreground);
  font-size: 14px;
  outline: none;
  transition: all 0.15s;
  font-family: inherit;
}
.form-group input:focus {
  border-color: var(--ring);
  box-shadow: 0 0 0 2px oklch(0.708 0 0 / 0.2);
}
.form-group input::placeholder { color: var(--muted-foreground); opacity: 0.6; }

.modal-actions {
  display: flex;
  gap: 8px;
  margin-top: 24px;
}
.modal-actions .btn { flex: 1; height: 40px; }

/* ===== FAB ===== */
.fab {
  position: fixed;
  bottom: 24px;
  right: 20px;
  width: 48px;
  height: 48px;
  background: var(--primary);
  border: none;
  border-radius: var(--radius);
  color: var(--primary-foreground);
  font-size: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 12px oklch(0 0 0 / 0.08);
  cursor: pointer;
  z-index: 50;
  transition: all 0.15s;
  font-family: inherit;
}
.fab:hover { opacity: 0.9; }
.fab:active { transform: scale(0.95); }

/* ===== Textarea ===== */
.data-textarea {
  width: 100%;
  min-height: 120px;
  padding: 10px 12px;
  background: var(--background);
  border: 1px solid var(--input);
  border-radius: calc(var(--radius) - 2px);
  color: var(--foreground);
  font-size: 13px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  outline: none;
  resize: vertical;
  line-height: 1.5;
}
.data-textarea:focus {
  border-color: var(--ring);
  box-shadow: 0 0 0 2px oklch(0.708 0 0 / 0.2);
}

/* ===== shadcn Sonner-style Toast ===== */
.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--card);
  color: var(--foreground);
  padding: 12px 20px;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 500;
  opacity: 0;
  transition: all 0.3s ease;
  z-index: 300;
  pointer-events: none;
  border: 1px solid var(--border);
  box-shadow: 0 4px 12px oklch(0 0 0 / 0.08);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ===== shadcn Separator ===== */
.separator {
  height: 1px;
  background: var(--border);
  margin: 16px 0;
}

/* ===== Desktop layout ===== */
@media (min-width: 500px) {
  .page { max-width: 480px; margin: 0 auto; }
  .tabs { max-width: 480px; margin: 16px auto 0; }
  .modal {
    border-radius: var(--radius);
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .modal-overlay { align-items: center; }
}
</style>
</head>
<body>

<div class="header">
  <h1>영단어 암기장</h1>
  <button class="btn-icon" onclick="openDataModal()" title="데이터 관리">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
  </button>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('list')">단어 목록</button>
  <button class="tab" onclick="switchTab('study')">학습하기</button>
</div>

<!-- Word List Page -->
<div id="page-list" class="page active">
  <div id="word-list" class="word-list"></div>
  <div id="empty-state" class="empty-state" style="display:none;">
    <div class="empty-state-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.4;color:var(--muted-foreground)"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/><path d="M8 7h6"/><path d="M8 11h8"/></svg>
    </div>

  </button>
</div>

<!-- Study Page -->
<div id="page-study" class="page">
  <div id="study-select" class="study-mode-select">

    <div class="mode-card selected" onclick="selectMode('meaning-to-word')" id="mode-meaning-to-word">
      <h3>뜻 → 영단어</h3>

      <h3>영단어 → 뜻</h3>

    <div class="study-options">

<!-- Data Modal -->
<div class="modal-overlay" id="data-modal">
  <div class="modal">
    <h2>설정</h2>
    <div class="form-group">
      <label>동기화 코드</label>
      <input type="text" id="input-sync-code" placeholder="예: mywords123" autocomplete="off">
      <p style="font-size:12px;color:var(--muted-foreground);margin-top:4px;">같은 코드를 입력하면 어떤 기기에서든 같은 단어장을 사용할 수 있어요.</p>
    </div>

    <div class="modal-actions" style="margin-top:0;margin-bottom:16px;">

      <button class="btn btn-secondary" style="width:100%;height:40px;" onclick="importData()">가져오기</button>
      <div class="separator"></div>
      <button class="btn btn-destructive" style="width:100%;height:40px;" onclick="clearAllData()">전체 삭제</button>
      <button class="btn btn-ghost" style="width:100%;height:40px;" onclick="closeDataModal()">닫기</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
let words = JSON.parse(localStorage.getItem('vocab-words') || '[]');
let editingId = null;
let studyMode = 'meaning-to-word';
let shuffleOn = true;
let studyWords = [];
let studyIndex = 0;
let studyCorrect = 0;
let studyWrong = 0;
let wrongWords = [];

function save() {
  localStorage.setItem('vocab-words', JSON.stringify(words));
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (tab === 'list' && i === 0) || (tab === 'study' && i === 1));
  });
  document.getElementById('page-list').classList.toggle('active', tab === 'list');
  document.getElementById('page-study').classList.toggle('active', tab === 'study');
  if (tab === 'study') updateStudyWordCount();
}

function renderWords() {
  const list = document.getElementById('word-list');
  const empty = document.getElementById('empty-state');
  if (words.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  list.innerHTML = words.map((w, i) => `
    <div class="word-item">
      <div class="word-item-header">
        <h3>${esc(w.word)}</h3>
        <div class="word-item-actions">
          <button class="btn btn-ghost btn-sm" onclick="editWord(${i})">수정</button>
          <button class="btn btn-ghost btn-sm" style="color:var(--destructive)" onclick="deleteWord(${i})">삭제</button>
        </div>
      </div>
      <div class="word-meaning">${esc(w.meaning)}</div>
      <div class="word-meta">
        ${w.synonym ? `<span class="badge badge-syn">동의어: ${esc(w.synonym)}</span>` : ''}
        ${w.antonym ? `<span class="badge badge-ant">반의어: ${esc(w.antonym)}</span>` : ''}
      </div>
    </div>
  `).join('');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function openAddModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = '단어 추가';
  document.getElementById('input-word').value = '';
  document.getElementById('input-meaning').value = '';
  document.getElementById('input-synonym').value = '';
  document.getElementById('input-antonym').value = '';
  document.getElementById('add-modal').classList.add('active');
  setTimeout(() => document.getElementById('input-word').focus(), 100);
}

function editWord(i) {
  editingId = i;
  const w = words[i];
  document.getElementById('modal-title').textContent = '단어 수정';
  document.getElementById('input-word').value = w.word;
  document.getElementById('input-meaning').value = w.meaning;
  document.getElementById('input-synonym').value = w.synonym || '';
  document.getElementById('input-antonym').value = w.antonym || '';
  document.getElementById('add-modal').classList.add('active');
  setTimeout(() => document.getElementById('input-word').focus(), 100);
}

function closeAddModal() {
  document.getElementById('add-modal').classList.remove('active');
}

function saveWord() {
  const word = document.getElementById('input-word').value.trim();
  const meaning = document.getElementById('input-meaning').value.trim();
  const synonym = document.getElementById('input-synonym').value.trim();
  const antonym = document.getElementById('input-antonym').value.trim();
  if (!word || !meaning) {
    showToast('영단어와 뜻은 필수입니다.');
    return;
  }
  const entry = { word, meaning, synonym, antonym };
  if (editingId !== null) {
    words[editingId] = entry;
    showToast('단어가 수정되었습니다.');
  } else {
    words.push(entry);
    showToast('단어가 추가되었습니다.');
  }
  save();
  renderWords();
  closeAddModal();
}

function deleteWord(i) {
  if (confirm(`"${words[i].word}" 단어를 삭제할까요?`)) {
    words.splice(i, 1);
    save();
    renderWords();
    showToast('삭제되었습니다.');
  }
}

function selectMode(mode) {
  studyMode = mode;
  document.getElementById('mode-meaning-to-word').classList.toggle('selected', mode === 'meaning-to-word');
  document.getElementById('mode-word-to-meaning').classList.toggle('selected', mode === 'word-to-meaning');
}

function toggleShuffle() {
  shuffleOn = !shuffleOn;
  document.getElementById('shuffle-toggle').classList.toggle('on', shuffleOn);
}

function updateStudyWordCount() {
  document.getElementById('study-word-count').textContent = `총 ${words.length}개 단어`;
}

function startStudy() {
  if (words.length === 0) {
    showToast('학습할 단어가 없습니다.');
    return;
  }
  studyWords = [...words];
  if (shuffleOn) shuffle(studyWords);
  studyIndex = 0;
  studyCorrect = 0;
  studyWrong = 0;
  wrongWords = [];
  document.getElementById('study-select').style.display = 'none';
  document.getElementById('study-result').style.display = 'none';
  document.getElementById('study-active').classList.add('active');
  showCard();
}

function showCard() {
  const w = studyWords[studyIndex];
  const total = studyWords.length;
  document.getElementById('study-progress-text').textContent = `${studyIndex + 1} / ${total}`;
  document.getElementById('study-progress-fill').style.width = `${((studyIndex + 1) / total) * 100}%`;

  const hidden = document.getElementById('card-hidden');
  hidden.classList.remove('revealed');

  if (studyMode === 'meaning-to-word') {
    document.getElementById('card-label').textContent = '뜻';
    document.getElementById('card-main').textContent = w.meaning;
    document.getElementById('card-answer').textContent = w.word;
  } else {
    document.getElementById('card-label').textContent = '영단어';
    document.getElementById('card-main').textContent = w.word;
    document.getElementById('card-answer').textContent = w.meaning;
  }

  document.getElementById('extra-syn').classList.remove('visible');
  document.getElementById('extra-ant').classList.remove('visible');
  document.getElementById('extra-syn-val').textContent = w.synonym || '-';
  document.getElementById('extra-ant-val').textContent = w.antonym || '-';
}

function revealAnswer() {
  const hidden = document.getElementById('card-hidden');
  if (hidden.classList.contains('revealed')) return;
  hidden.classList.add('revealed');
  document.getElementById('extra-syn').classList.add('visible');
  document.getElementById('extra-ant').classList.add('visible');
}

function markWord(correct) {
  const hidden = document.getElementById('card-hidden');
  if (!hidden.classList.contains('revealed')) revealAnswer();

  if (correct) {
    studyCorrect++;
  } else {
    studyWrong++;
    wrongWords.push(studyWords[studyIndex]);
  }

  studyIndex++;
  if (studyIndex >= studyWords.length) {
    showResult();
  } else {
    showCard();
  }
}

function showResult() {
  document.getElementById('study-active').classList.remove('active');
  document.getElementById('study-result').style.display = 'block';
  document.getElementById('result-correct').textContent = studyCorrect;
  document.getElementById('result-wrong').textContent = studyWrong;

  const wrongList = document.getElementById('wrong-word-list');
  if (wrongWords.length > 0) {
    wrongList.innerHTML = '<h3 style="font-size:14px;color:var(--destructive);margin-bottom:10px;font-weight:600;">틀린 단어</h3>' +
      wrongWords.map(w => `
        <div class="wrong-item">
          <strong>${esc(w.word)}</strong>
          <span>${esc(w.meaning)}</span>
        </div>
      `).join('');
  } else {
    wrongList.innerHTML = '<p style="color:var(--success);font-size:14px;margin-top:20px;font-weight:500;">전부 맞혔어요!</p>';
  }
}

function restudyWrong() {
  if (wrongWords.length === 0) {
    showToast('틀린 단어가 없습니다.');
    return;
  }
  studyWords = [...wrongWords];
  if (shuffleOn) shuffle(studyWords);
  studyIndex = 0;
  studyCorrect = 0;
  studyWrong = 0;
  wrongWords = [];
  document.getElementById('study-result').style.display = 'none';
  document.getElementById('study-active').classList.add('active');
  showCard();
}

function resetStudy() {
  document.getElementById('study-result').style.display = 'none';
  document.getElementById('study-active').classList.remove('active');
  document.getElementById('study-select').style.display = 'flex';
  updateStudyWordCount();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function openDataModal() {
  document.getElementById('data-textarea').value = '';
  document.getElementById('input-sync-code').value = getSyncCode();
  updateSyncStatus();
  document.getElementById('data-modal').classList.add('active');
}
function closeDataModal() {
  document.getElementById('data-modal').classList.remove('active');
}

function exportData() {
  document.getElementById('data-textarea').value = JSON.stringify(words, null, 2);
  showToast('데이터가 표시되었습니다. 복사하세요.');
}

function importData() {
  const text = document.getElementById('data-textarea').value.trim();
  if (!text) { showToast('데이터를 입력하세요.'); return; }
  try {
    const data = JSON.parse(text);
    if (!Array.isArray(data)) throw new Error();
    const valid = data.every(d => d.word && d.meaning);
    if (!valid) throw new Error();
    words = data;
    save();
    renderWords();
    closeDataModal();
    showToast(`${data.length}개 단어를 가져왔습니다.`);
  } catch {
    showToast('올바른 JSON 형식이 아닙니다.');
  }
}

function clearAllData() {
  if (confirm('모든 단어를 삭제할까요? 이 작업은 되돌릴 수 없습니다.')) {
    words = [];
    save();
    renderWords();
    closeDataModal();
    showToast('모든 데이터가 삭제되었습니다.');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.classList.remove('active');
  });
});

document.getElementById('input-antonym').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') saveWord();
});

renderWords();
</script>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAlwAMqaGuUfUEq4dBw4Jer8CReRx4j6uI",
  authDomain: "vocab-5e42b.firebaseapp.com",
  databaseURL: "https://vocab-5e42b-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "vocab-5e42b",
  storageBucket: "vocab-5e42b.firebasestorage.app",
  messagingSenderId: "68056478170",
  appId: "1:68056478170:web:827484bf242bd2b64590e3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let syncListener = null;
let isSyncing = false;

// Make functions globally accessible
window.getSyncCode = function() {
  return localStorage.getItem('vocab-sync-code') || '';
};

window.saveSyncCode = function() {
  const code = document.getElementById('input-sync-code').value.trim();
  if (!code) {
    showToast('동기화 코드를 입력하세요.');
    return;
  }
  localStorage.setItem('vocab-sync-code', code);
  startSync(code);
  updateSyncStatus();
  showToast('동기화가 연결되었습니다!');
};

window.updateSyncStatus = function() {
  const el = document.getElementById('sync-status');
  const code = getSyncCode();
  if (code) {
    el.innerHTML = '<span style="color:var(--success);">연결됨: <strong>' + code + '</strong></span>';
  } else {
    el.innerHTML = '<span style="color:var(--muted-foreground);">연결 안 됨</span>';
  }
};

function pushToFirebase() {
  const code = getSyncCode();
  if (!code || isSyncing) return;
  const wordsRef = ref(db, 'rooms/' + code + '/words');
  set(wordsRef, words).catch(err => {
    console.error('Firebase push error:', err);
  });
}

function startSync(code) {
  // Remove old listener
  if (syncListener) {
    syncListener();
    syncListener = null;
  }

  const wordsRef = ref(db, 'rooms/' + code + '/words');

  // Push current local data first
  pushToFirebase();

  // Listen for remote changes
  syncListener = onValue(wordsRef, (snapshot) => {
    const remoteWords = snapshot.val();
    if (remoteWords && Array.isArray(remoteWords)) {
      isSyncing = true;
      words = remoteWords;
      localStorage.setItem('vocab-words', JSON.stringify(words));
      renderWords();
      isSyncing = false;
    }
  });
}

// Override save to also push to Firebase
const originalSave = window.save;
window.save = function() {
  originalSave();
  pushToFirebase();
};

// Auto-connect on load
const initialCode = getSyncCode();
if (initialCode) {
  startSync(initialCode);
}
</script>
</body>
